<!DOCTYPE html>
<html lang="ru" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Авторизация | MOTO Market</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body data-page-title="page_login_title">
  <div id="navbar-container"></div>

  <div class="login-container">
    <h2><span data-i18n="login_title">Войти в</span> <span>MOTO | Market</span></h2>
    <form id="loginForm">
      <label for="emailInput" data-i18n="email">Email</label>
      <input type="email" id="emailInput" data-i18n-placeholder="enterEmail" placeholder="Введите email" required>

      <label for="passwordInput" data-i18n="password">Пароль</label>
      <input type="password" id="passwordInput" data-i18n-placeholder="enterPassword" placeholder="Введите пароль" required>

      <button type="submit" class="login-btn" id="loginBtn" data-i18n="login">Войти</button>
    </form>

    <p class="register-text"><span data-i18n="no_account">Нет аккаунта?</span> <a href="register.html" data-i18n="register">Зарегистрироваться</a></p>
  </div>
  <script src="js/navbar.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
