<!DOCTYPE html>
<html lang="ru" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация | MOTO Market</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/register.css">
</head>
<body data-page-title="page_register_title">
  <div id="navbar-container"></div>

  <main class="container auth-card">
    <h2 data-i18n="create_account">Создать аккаунт</h2>

    <form id="registerForm">
      <input type="text" id="username" data-i18n-placeholder="name" placeholder="Имя">
      <input type="email" id="email" data-i18n-placeholder="email" placeholder="Email">
      <input type="text" id="phone" data-i18n-placeholder="phone_placeholder" placeholder="Телефон">

      <div class="password-wrapper">
        <input type="password" id="password" data-i18n-placeholder="password" placeholder="Пароль">
        <button type="button" class="toggle-password" data-target="password" aria-label="Toggle password">👁</button>
      </div>

      <div class="password-wrapper">
        <input type="password" id="confirmPassword" data-i18n-placeholder="confirm_password" placeholder="Повторите пароль">
        <button type="button" class="toggle-password" data-target="confirmPassword" aria-label="Toggle password">👁</button>
      </div>

      <button id="registerBtn" type="submit" data-i18n="register">
        Зарегистрироваться
      </button>
    </form>

    <p class="login-link">
      <span data-i18n="have_account">Уже есть аккаунт?</span>
      <a href="login.html" data-i18n="login">Войти</a>
    </p>

    <p id="errorMsg"></p>
  </main>

  <script src="js/navbar.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/register.js"></script>
</body>
</html>
